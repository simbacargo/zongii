<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Msaidizi{% endblock %}</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* HTMX Loading state logic */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: flex; }
        .htmx-request.htmx-indicator { display: flex; }
    </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="bg-gray-100 text-gray-700">

    <main class="mx-auto flex w-full min-h-screen">
  {% include 'snippets/aside.html' %}

        <div class="flex-1 bg-white m-1 rounded-md p-2 flex flex-col relative shadow-sm overflow-hidden">
            
            <div id="loading-spinner" class="htmx-indicator absojlute inset-0 z-50 flex items-center justify-center bg-white/40 backdrop-blur-sm">
                <div class="flex flex-col items-center gap-2 top-1/5 absolute">
                    <span class="h-10 w-10 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent"></span>
                    <span class="text-sm font-medium text-gray-500">Loading...</span>
                </div>
            </div>

            <div id="main-content" class="flex-1 p-4 overflow-y-auto">
                {% if messages %}
                    <div class="mb-4">
                        {% for message in messages %}
                            <div class="p-3 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %} mb-2">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>

    <div id="modal-backdrop" 
         class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/50 backdrop-blur-sm"
         onclick="if(event.target===this) closeModal()">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-lg w-full m-4"></div>
    </div>

    <script>
        // CSRF Token setup for HTMX (Crucial for Django POST)
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });

        // Modal Logic
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'modal-content') {
                document.getElementById('modal-backdrop').classList.remove('hidden');
                document.getElementById('modal-backdrop').classList.add('flex');
            }
        });

        function closeModal() {
            const modal = document.getElementById('modal-backdrop');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('modal-content').innerHTML = '';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
