{% block content %}
<div class="max-w-7xl mx-auto" id="inventory">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Inventory</h1>
            <p class="text-gray-500">Manage your stock and technical specifications.</p>
        </div>
        <a href="#" hx-get="{% url 'product_create' %}" hx-target="#main-content" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition-all flex items-center gap-2">
            <i class="bi bi-plus-lg"></i> Add Product
        </a>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 mb-6">
        <div class="relative max-w-md">
            <span class="absolute left-4 top-3.5 text-gray-400">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" 
                   name="q" 
                   value="{{ query }}"
                   placeholder="Search name, brand, or part number..."
                   class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition"
                   hx-get="{% url 'product_list' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#main-content"
                   hx-indicator="#search-indicator">
            <div id="search-indicator" class="htmx-indicator absolute right-4 top-4">
                <div class="animate-spin h-4 w-4 border-2 border-indigo-500 border-t-transparent rounded-full"></div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-gray-100">
                <tr>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Product Details</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Brand/MPN</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Price</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase text-center">In Stock</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase"></th>
                </tr>
            </thead>
            <tbody id="product-table-body">
                {% include "partials/product_table.html" %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
