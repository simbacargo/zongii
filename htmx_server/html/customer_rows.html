<tr id="customer-{{ c.id }}" class="hover:bg-slate-50/50 transition-colors">
    <td class="p-6">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold">
                {{ c.name|slice:":1" }}
            </div>
            <div>
                <p class="text-md font-black text-slate-900">{{ c.name }}</p>
                <p class="text-sm text-slate-500">{{ c.phone|default:"No Phone" }}</p>
            </div>
        </div>
    </td>
    <td class="p-6 text-right">
        Tsh.<span class="text-xl font-black text-rose-600"> {{ c.remaining_balance }}</span>
    </td>
    <td class="p-6">
        <form hx-post="{ % url 'customer_debt_list' %}" 
              hx-target="#customer-{{ c.id }}" 
              hx-swap="outerHTML"
              class="flex items-center justify-center gap-2">
            {% csrf_token %}
            <input type="hidden" name="customer_id" value="{{ c.id }}">
            
            <div class="relative">
                <span class="absolute left-3 top-2 text-slate-400 text-xs">$</span>
                <input type="number" name="amount" placeholder="0.00" step="0.01"
                       class="w-24 pl-6 pr-2 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button type="submit" class="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-xl hover:bg-indigo-600 transition-all">
                Pay
            </button>
            
            <button type="button" 
                    hx-post="{ % url 'customer_debt_list' %}"
                    hx-vals='{"customer_id": "{{ c.id }}", "amount": "{{ c.balance }}"}'
                    hx-target="#customer-{{ c.id }}"
                    hx-swap="outerHTML"
                    hx-confirm="Clear full debt for {{ c.name }}?"
                    class="p-2 text-slate-400 hover:text-emerald-600 transition-colors"
                    title="Clear Full Debt">
                <i class="bi bi-check-all text-xl"></i>
            </button>
        </form>
    </td>
</tr>
