<div class="absolute z-50 w-full bg-white border border-gray-200 rounded-xl shadow-2xl mt-1 max-h-72 overflow-y-auto">
    {% for p in products %}
    <div class="p-4 hover:bg-indigo-50 cursor-pointer flex justify-between items-center border-b border-gray-50"
         hx-get="{% url 'sale_create' %}?product_id={{ p.id }}&quantity_sold=1"
         hx-target="#calc-area"
         hx-on::after-request="document.getElementById('selected-product-id').value='{{ p.id }}'; document.getElementById('search-results').innerHTML='';">
        <div>
            <p class="font-bold text-gray-800">{{ p.name }}</p>
            <p class="text-xs text-gray-400">SN: {{ p.part_number }} | Stock: {{ p.quantity_at_hand }}</p>
        </div>
        <span class="text-indigo-600 font-bold">${{ p.retail_price }}</span>
    </div>
    {% endfor %}
</div>
