<div id="cart-container" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left">
        <thead class="bg-gray-50 text-xs font-bold text-gray-500 uppercase">
            <tr>
                <th class="p-4">Product</th>
                <th class="p-4">Qty</th>
                <th class="p-4 text-right">Total</th>
                <th class="p-4"></th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for item in cart_items %}
            <tr class="text-sm">
                <td class="p-4 font-medium text-gray-800">{{ item.product.name }}</td>
                <td class="p-4 text-gray-600">{{ item.quantity }}</td>
                <td class="p-4 text-right font-bold">${{ item.total }}</td>
                <td class="p-4 text-right">
                    <button hx-post="{% url 'manage_cart' %}" 
                            hx-vals='{"remove_id": "{{ item.product.id }}"}'
                            hx-target="#cart-container"
                            hx-swap="outerHTML"
                            class="text-red-400 hover:text-red-600">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="p-10 text-center text-gray-400 italic">Cart is empty</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="p-6 bg-gray-50 border-t flex justify-between items-center">
        <span class="text-gray-500 font-bold uppercase text-xs">Grand Total</span>
        <span class="text-2xl font-black text-indigo-600">${{ grand_total }}</span>
    </div>
</div>
