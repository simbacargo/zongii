<div class="bg-white rounded-2xl shadow-2xl overflow-hidden w-full">

    <!-- Header gradient -->
    <div class="relative bg-gradient-to-br from-indigo-600 to-violet-600 px-7 pt-8 pb-14">
        <button onclick="closeModal()"
                class="absolute top-4 right-4 h-8 w-8 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 text-white transition-colors">
            <i class="bi bi-x-lg text-sm"></i>
        </button>
        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mb-4">
            <i class="bi bi-tags-fill text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black text-white">New Category</h2>
        <p class="text-indigo-200 text-sm mt-1">Organise your product catalogue</p>
    </div>

    <!-- Live preview card (overlaps the header) -->
    <div class="mx-6 -mt-6 bg-white rounded-2xl shadow-lg border border-gray-100 px-5 py-4 flex items-center gap-4">
        <div id="cat-preview-icon"
             class="w-11 h-11 rounded-xl bg-indigo-100 text-indigo-600 font-black text-lg flex items-center justify-center shrink-0 transition-all">
            <i class="bi bi-question text-indigo-300"></i>
        </div>
        <div class="min-w-0 flex-1">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider">Preview</p>
            <p id="cat-preview-name" class="text-sm font-bold text-gray-500 italic truncate">Start typing a name…</p>
        </div>
        <span id="cat-preview-badge"
              class="px-2.5 py-1 text-[10px] font-black rounded-lg bg-gray-100 text-gray-400 uppercase tracking-wide shrink-0">
            Tag
        </span>
    </div>

    <!-- Form -->
    <form hx-post="{% url 'category_create' %}"
          hx-target="#category-table-body"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful){ closeModal(); this.reset(); resetCategoryPreview(); }"
          class="px-6 pt-6 pb-7 space-y-6">
        {% csrf_token %}

        <!-- Name input -->
        <div>
            <label class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-2">
                Category Name <span class="text-red-400">*</span>
            </label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
                    <i class="bi bi-tag text-base"></i>
                </span>
                <input type="text"
                       name="name"
                       id="cat-name-input"
                       required
                       autofocus
                       maxlength="100"
                       autocomplete="off"
                       placeholder="e.g. PVC Pipes, Ball Valves…"
                       class="w-full border-2 border-gray-200 focus:border-indigo-500 rounded-xl pl-11 pr-16 py-3.5 text-sm font-medium outline-none transition-all bg-gray-50 focus:bg-white">
                <span id="cat-char-count"
                      class="absolute right-4 top-1/2 -translate-y-1/2 text-xs text-gray-300 font-mono select-none">
                    0/100
                </span>
            </div>
        </div>

        <!-- Quick suggestions -->
        <div>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-3">
                <i class="bi bi-lightning-fill text-amber-400 mr-1"></i> Quick suggestions
            </p>
            <div class="flex flex-wrap gap-2">
                <button type="button" onclick="pickSuggestion('PVC Pipes')"       class="cat-chip">PVC Pipes</button>
                <button type="button" onclick="pickSuggestion('Ball Valves')"     class="cat-chip">Ball Valves</button>
                <button type="button" onclick="pickSuggestion('Fittings')"        class="cat-chip">Fittings</button>
                <button type="button" onclick="pickSuggestion('Copper Pipes')"    class="cat-chip">Copper Pipes</button>
                <button type="button" onclick="pickSuggestion('Water Heaters')"   class="cat-chip">Water Heaters</button>
                <button type="button" onclick="pickSuggestion('Pumps')"           class="cat-chip">Pumps</button>
                <button type="button" onclick="pickSuggestion('Gate Valves')"     class="cat-chip">Gate Valves</button>
                <button type="button" onclick="pickSuggestion('Taps & Faucets')"  class="cat-chip">Taps & Faucets</button>
                <button type="button" onclick="pickSuggestion('Sealants')"        class="cat-chip">Sealants</button>
                <button type="button" onclick="pickSuggestion('Filters')"         class="cat-chip">Filters</button>
                <button type="button" onclick="pickSuggestion('Tanks')"           class="cat-chip">Tanks</button>
                <button type="button" onclick="pickSuggestion('Tools')"           class="cat-chip">Tools</button>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-1">
            <button type="button" onclick="closeModal()"
                    class="flex-1 py-3 text-sm font-bold text-gray-500 hover:text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">
                Cancel
            </button>
            <button type="submit"
                    class="flex-2 w-full py-3 text-sm font-black text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[.98] flex items-center justify-center gap-2">
                <i class="bi bi-plus-circle-fill"></i> Create Category
            </button>
        </div>
    </form>
</div>

<style>
    .cat-chip {
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 700;
        background: #f3f4f6;
        color: #6b7280;
        border-radius: 8px;
        transition: all 0.15s;
        border: 1.5px solid transparent;
    }
    .cat-chip:hover {
        background: #eef2ff;
        color: #4f46e5;
        border-color: #c7d2fe;
    }
    .cat-chip.selected {
        background: #eef2ff;
        color: #4f46e5;
        border-color: #818cf8;
    }
</style>

<script>
(function () {
    const input    = document.getElementById('cat-name-input');
    const prevName = document.getElementById('cat-preview-name');
    const prevIcon = document.getElementById('cat-preview-icon');
    const prevBadge= document.getElementById('cat-preview-badge');
    const counter  = document.getElementById('cat-char-count');

    const colors = [
        ['bg-indigo-100','text-indigo-600'],
        ['bg-violet-100','text-violet-600'],
        ['bg-rose-100',  'text-rose-600'],
        ['bg-amber-100', 'text-amber-600'],
        ['bg-emerald-100','text-emerald-600'],
        ['bg-sky-100',   'text-sky-600'],
    ];

    function getColor(name) {
        const idx = name.charCodeAt(0) % colors.length;
        return colors[idx];
    }

    function updatePreview(val) {
        counter.textContent = val.length + '/100';
        if (!val) {
            prevName.textContent = 'Start typing a name…';
            prevName.classList.add('text-gray-400','italic');
            prevName.classList.remove('text-gray-800');
            prevIcon.innerHTML = '<i class="bi bi-question text-indigo-300"></i>';
            prevIcon.className = 'w-11 h-11 rounded-xl bg-indigo-100 font-black text-lg flex items-center justify-center shrink-0 transition-all';
            prevBadge.textContent = 'Tag';
            prevBadge.className   = 'px-2.5 py-1 text-[10px] font-black rounded-lg bg-gray-100 text-gray-400 uppercase tracking-wide shrink-0';
            return;
        }
        const [bg, text] = getColor(val);
        prevName.textContent = val;
        prevName.classList.remove('text-gray-400','italic');
        prevName.classList.add('text-gray-800');
        prevIcon.innerHTML  = val[0].toUpperCase();
        prevIcon.className  = `w-11 h-11 rounded-xl ${bg} ${text} font-black text-lg flex items-center justify-center shrink-0 transition-all`;
        prevBadge.textContent = val.length > 10 ? val.substring(0, 10) + '…' : val;
        prevBadge.className   = `px-2.5 py-1 text-[10px] font-black rounded-lg ${bg} ${text} uppercase tracking-wide shrink-0`;
    }

    input.addEventListener('input', () => updatePreview(input.value.trim()));

    window.pickSuggestion = function(name) {
        input.value = name;
        updatePreview(name);
        input.focus();
        document.querySelectorAll('.cat-chip').forEach(c => {
            c.classList.toggle('selected', c.textContent.trim() === name);
        });
    };

    window.resetCategoryPreview = function() { updatePreview(''); };

    input.focus();
})();
</script>
